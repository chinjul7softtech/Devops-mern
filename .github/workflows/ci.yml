name: MERN CI


on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports: ['27017:27017']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: 
          node-version: '20'

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat

      - name: Waiting for Mongodb to be ready
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done 
          
            echo 'MongoDB is up'
      
      - name: Seed MongoDB
        working-directory: ./backend
        run: |
          npm install
          node seedTasksData.js
  test:
    runs-on: ubuntu-latest
    needs: mongo-init

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: 
          node-version: '20'
      
      - name: Install Dependencies for backend
        working-directory: ./backend
        run: npm install

      - name: Running Backend test
        working-directory: ./backend
        run: npm test